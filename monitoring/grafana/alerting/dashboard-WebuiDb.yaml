apiVersion: 1
groups:
    - orgId: 1
      name: 'web UI: Too many inactive minion jobs alert'
      folder: Salt
      interval: 1m
      rules:
        - uid: 8i03cmC5z
          title: 'web UI: Inactive minion jobs alert'
          condition: A
          data:
            - refId: A
              datasourceUid: __expr__
              model:
                conditions:
                    - evaluator:
                        params:
                            - 10000
                        type: gt
                      operator:
                        type: or
                      query:
                        params:
                            - inactive_jobs
                      reducer:
                        type: last
                intervalMs: 1000
                maxDataPoints: 43200
                refId: A
                type: classic_conditions
            - refId: inactive_jobs
              relativeTimeRange:
                from: 300
                to: 0
              datasourceUid: "000000001"
              model:
                alias: Inactive
                groupBy:
                    - params:
                        - $__interval
                      type: time
                    - params:
                        - previous
                      type: fill
                intervalMs: 1000
                maxDataPoints: 43200
                measurement: openqa_minion_jobs
                orderByTime: ASC
                policy: default
                refId: inactive_jobs
                resultFormat: time_series
                select:
                    - - params:
                            - inactive
                        type: field
                      - params: []
                        type: mean
                tags:
                    - key: host
                      operator: =
                      value: openqa
          dashboardUid: WebuiDb
          panelId: 19
          noDataState: OK
          execErrState: OK
          for: 5m
          annotations:
            __alertId__: "300"
            __dashboardUid__: WebuiDb
            __panelId__: "19"
            message: |-
                There are more than 10K inactive minion jobs.

                Review inactive minion jobs https://openqa.suse.de/minion/jobs?state=inactive
          labels:
            __contacts__: '"osd-admins"'
            rule_uid: 8i03cmC5z
          isPaused: false
