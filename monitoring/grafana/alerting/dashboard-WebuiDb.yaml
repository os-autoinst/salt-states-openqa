apiVersion: 1
groups:
    - orgId: 1
      name: 'web UI: Too many inactive minion jobs alert'
      folder: Salt
      interval: 1m
      rules:
        - uid: 8i03cmC5z
          title: 'web UI: Inactive minion jobs alert'
          condition: A
          data:
            - refId: inactive_jobs
              relativeTimeRange:
                from: 300
                to: 0
              datasourceUid: "000000001"
              model:
                alias: Inactive
                groupBy:
                    - params:
                        - $__interval
                      type: time
                    - params:
                        - previous
                      type: fill
                intervalMs: 1000
                maxDataPoints: 43200
                measurement: openqa_minion_jobs
                orderByTime: ASC
                policy: default
                refId: inactive_jobs
                resultFormat: time_series
                select:
                    - - params:
                            - inactive
                        type: field
                      - params: []
                        type: mean
                tags:
                    - key: host
                      operator: =
                      value: openqa
            - refId: inactive_jobs_derivative
              relativeTimeRange:
                from: 600
                to: 0
              datasourceUid: "000000001"
              model:
                alias: inactive_derivative
                datasource:
                    type: influxdb
                    uid: "000000001"
                groupBy:
                    - params:
                        - $__interval
                      type: time
                    - params:
                        - previous
                      type: fill
                hide: false
                measurement: openqa_minion_jobs
                orderByTime: ASC
                policy: default
                refId: inactive_jobs_derivative
                resultFormat: time_series
                select:
                    - - params:
                            - inactive
                        type: field
                      - params: []
                        type: last
                      - params:
                            - 10s
                        type: derivative
                tags:
                    - key: host::tag
                      operator: =
                      value: openqa
            - refId: A
              datasourceUid: __expr__
              model:
                conditions:
                    - evaluator:
                        params:
                            - 40000
                        type: gt
                      operator:
                        type: or
                      query:
                        params:
                            - inactive_jobs
                      reducer:
                        type: last
                    - evaluator:
                        params:
                            - 10000
                            - 0
                        type: gt
                      operator:
                        type: or
                      query:
                        params:
                            - inactive_jobs
                      reducer:
                        params: []
                        type: last
                      type: query
                    - evaluator:
                        params:
                            - 0
                            - 0
                        type: gt
                      operator:
                        type: and
                      query:
                        params:
                            - inactive_jobs_derivative
                      reducer:
                        params: []
                        type: last
                      type: query
                intervalMs: 1000
                maxDataPoints: 43200
                refId: A
                type: classic_conditions
          dashboardUid: WebuiDb
          panelId: 19
          noDataState: OK
          execErrState: OK
          for: 5m
          annotations:
            __alertId__: "300"
            __dashboardUid__: WebuiDb
            __panelId__: "19"
            message: |-
                There are too many total inactive minion jobs or a too long upward trend.

                Review inactive minion jobs https://openqa.suse.de/minion/jobs?state=inactive
          labels:
            __contacts__: '"osd-admins"'
            rule_uid: 8i03cmC5z
          isPaused: false
