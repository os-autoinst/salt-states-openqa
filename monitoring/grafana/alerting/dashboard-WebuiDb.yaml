apiVersion: 1
groups:
    - orgId: 1
      name: Web proxy Response Time alert
      folder: Salt
      interval: 1m
      rules:
        - uid: IeChie2He
          title: Web proxy Response Time alert
          condition: A
          data:
            - refId: A
              datasourceUid: __expr__
              model:
                conditions:
                    - evaluator:
                        params:
                            - 0.6
                        type: gt
                      operator:
                        type: and
                      query:
                        params:
                            - min_nginx_response
                      reducer:
                        type: median
                intervalMs: 1000
                maxDataPoints: 43200
                refId: A
                type: classic_conditions
            - refId: min_nginx_response
              relativeTimeRange:
                from: 1800
                to: 0
              datasourceUid: "000000001"
              model:
                alias: Min
                groupBy:
                    - params:
                        - $__interval
                      type: time
                    - params:
                        - "null"
                      type: fill
                interval: 12s
                intervalMs: 1000
                maxDataPoints: 43200
                measurement: nginx_log
                orderByTime: ASC
                policy: default
                query: SELECT min("response_time_s") FROM "nginx_log" WHERE ("host" = 'openqa' AND "request" !~ /\/api\/v1\/ws/) AND $timeFilter GROUP BY time($__interval) fill(0)
                rawQuery: false
                refId: min_nginx_response
                resultFormat: time_series
                select:
                    - - params:
                            - response_time_s
                        type: field
                      - params: []
                        type: min
                tags:
                    - key: host
                      operator: =
                      value: openqa
                    - condition: AND
                      key: request
                      operator: '!~'
                      value: /\/api\/v1\/ws/
          dashboardUid: WebuiDb
          panelId: 84
          noDataState: OK
          execErrState: OK
          for: 30m
          annotations:
            __alertId__: "307"
            __dashboardUid__: WebuiDb
            __panelId__: "84"
            message: |-
                The nginx response time exceeded the alert threshold.

                * Check the load of the web UI host
                * Consider restarting the openQA web UI service and/or nginx

                Also see https://progress.opensuse.org/issues/73633
          labels:
            __contacts__: '"osd-admins"'
            rule_uid: IeChie2He
          isPaused: false
    - orgId: 1
      name: Average Ping time (ms) alert
      folder: Salt
      interval: 1m
      rules:
        - uid: Fm02cmf4z
          title: Average Ping time (ms) alert
          condition: B
          data:
            - refId: A
              relativeTimeRange:
                from: 300
                to: 0
              datasourceUid: "000000001"
              model:
                alias: $tag_url
                datasource:
                    type: influxdb
                    uid: "000000001"
                groupBy:
                    - params:
                        - $__interval
                      type: time
                    - params:
                        - url
                      type: tag
                    - params:
                        - "null"
                      type: fill
                interval: 20s
                intervalMs: 1000
                maxDataPoints: 43200
                measurement: ping
                orderByTime: ASC
                policy: default
                query: SELECT mean("average_response_ms") FROM "ping" WHERE ("host" = 'openqa') AND $timeFilter GROUP BY time($__interval), "url" fill(null)
                rawQuery: false
                refId: A
                resultFormat: time_series
                select:
                    - - params:
                            - average_response_ms
                        type: field
                      - params: []
                        type: mean
                tags:
                    - key: host
                      operator: =
                      value: openqa
            - refId: B
              datasourceUid: __expr__
              model:
                conditions:
                    - evaluator:
                        params:
                            - 200
                        type: gt
                      operator:
                        type: and
                      query:
                        params:
                            - A
                      reducer:
                        type: avg
                intervalMs: 1000
                maxDataPoints: 43200
                refId: B
                type: classic_conditions
          dashboardUid: WebuiDb
          panelId: 76
          noDataState: OK
          execErrState: OK
          for: 5m
          annotations:
            __alertId__: "293"
            __dashboardUid__: WebuiDb
            __panelId__: "76"
            message: |-
                The following machines were not pingable for several minutes:
                {{ range $k, $v := $values -}}
                {{ if (match "B[0-9]*" $k) -}}
                * {{ $v.Labels }}{{ end }}
                {{ end }}

                Suggested actions:
                * Check if *you* can ping the machine (network connection within the infrastructure might be disrupted)
                * Login over ssh if possible, otherwise use a management interface, e.g. IPMI (machine could be stuck in boot process)
          labels:
            __contacts__: '"osd-admins"'
            rule_uid: Fm02cmf4z
          isPaused: false
